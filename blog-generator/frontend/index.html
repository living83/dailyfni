<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DailyFNI - 네이버 블로그 자동 생성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #18182a;
      --bg-input: #0e0e16;
      --border: rgba(255,255,255,0.06);
      --border-focus: rgba(99,102,241,0.5);
      --text: #e4e4e7;
      --text-dim: #71717a;
      --text-bright: #fafafa;
      --accent-1: #6366f1;
      --accent-2: #8b5cf6;
      --accent-3: #a78bfa;
      --green: #10b981;
      --green-dim: rgba(16,185,129,0.15);
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.15);
      --orange: #f59e0b;
      --orange-dim: rgba(245,158,11,0.15);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === Background Ambient Glow === */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      animation: float1 20s ease-in-out infinite;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 45%;
      height: 45%;
      background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
      animation: float2 25s ease-in-out infinite;
    }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(8%,12%)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-6%,-8%)} }

    /* === Header === */
    .header {
      position: relative;
      padding: 56px 0 72px;
      text-align: center;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,0.12) 0%, rgba(139,92,246,0.06) 50%, transparent 100%);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-1), var(--accent-2), transparent);
      opacity: 0.3;
    }
    .header-inner {
      position: relative;
      z-index: 1;
    }
    .header .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 20px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }
    .header h1 {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      font-size: 15px;
      color: var(--text-dim);
      margin-top: 8px;
      font-weight: 400;
    }

    /* === Container === */
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* === Glass Panel === */
    .glass {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
    }

    /* === Input Section === */
    .input-section {
      margin-top: -40px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .section-label .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-1);
    }

    .api-key-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }
    .api-key-row label {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text-dim);
      min-width: 70px;
    }
    .api-key-row input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .api-key-row input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
      outline: none;
    }
    .api-key-row input::placeholder { color: #3f3f50; }

    .product-input { margin-bottom: 8px; }
    .product-input textarea {
      width: 100%;
      height: 180px;
      padding: 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      resize: vertical;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .product-input textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
      outline: none;
    }
    .product-input textarea::placeholder { color: #3f3f50; }

    .btn-generate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 16px;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.25s, opacity 0.2s;
      box-shadow: 0 4px 24px rgba(99,102,241,0.25);
      letter-spacing: -0.01em;
    }
    .btn-generate:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(99,102,241,0.35);
    }
    .btn-generate:active { transform: translateY(0) scale(0.995); }
    .btn-generate:disabled {
      background: #27273a;
      color: #52525b;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-generate svg {
      width: 18px;
      height: 18px;
    }

    /* === Progress Section === */
    .progress-section {
      display: none;
      margin-top: 28px;
      animation: fadeSlideIn 0.4s ease;
    }
    .progress-section.active { display: block; }

    .progress-bar-track {
      background: #1e1e2e;
      border-radius: 20px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
      background-size: 200% 100%;
      border-radius: 20px;
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .progress-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .progress-step {
      text-align: center;
      padding: 14px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      background: #16161f;
      color: #3f3f50;
      border: 1px solid transparent;
      transition: all 0.35s;
    }
    .progress-step.active {
      background: rgba(99,102,241,0.08);
      color: var(--accent-3);
      border-color: rgba(99,102,241,0.15);
      animation: stepPulse 1.8s ease-in-out infinite;
    }
    .progress-step.done {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(16,185,129,0.2);
      animation: none;
    }
    .progress-step .icon { font-size: 20px; display: block; margin-bottom: 6px; }

    @keyframes stepPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    /* === Error Box === */
    .error-box {
      display: none;
      margin-top: 20px;
      padding: 14px 18px;
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 14px;
      font-weight: 500;
      animation: fadeSlideIn 0.3s ease;
    }
    .error-box.active { display: flex; align-items: center; gap: 10px; }
    .error-box::before { content: '!'; display: grid; place-items: center; width: 22px; height: 22px; border-radius: 50%; background: rgba(239,68,68,0.2); font-size: 12px; font-weight: 800; flex-shrink: 0; }

    /* === Results Section === */
    .results-section {
      display: none;
      margin-top: 48px;
      padding-bottom: 80px;
    }
    .results-section.active { display: block; animation: fadeSlideIn 0.5s ease; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .results-header h2 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-bright);
      letter-spacing: -0.02em;
    }
    .results-header p {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 6px;
    }
    .results-header .divider {
      width: 48px;
      height: 3px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      margin: 16px auto 0;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 960px) {
      .cards-grid { grid-template-columns: 1fr; max-width: 560px; margin: 0 auto; }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    }

    .card-header {
      padding: 20px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .card-header.friendly {
      background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(6,182,212,0.06));
      border-bottom-color: rgba(16,185,129,0.15);
    }
    .card-header.expert {
      background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(99,102,241,0.06));
      border-bottom-color: rgba(59,130,246,0.15);
    }
    .card-header.review {
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(239,68,68,0.06));
      border-bottom-color: rgba(245,158,11,0.15);
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-bright);
    }
    .card-header .badge {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .card-header.friendly .badge { background: var(--green-dim); color: var(--green); }
    .card-header.expert .badge { background: var(--blue-dim); color: var(--blue); }
    .card-header.review .badge { background: var(--orange-dim); color: var(--orange); }

    .card-title {
      padding: 18px 24px 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-bright);
      line-height: 1.5;
    }

    .card-content {
      padding: 14px 24px;
      font-size: 13px;
      line-height: 1.8;
      color: var(--text);
      flex: 1;
      max-height: 420px;
      overflow-y: auto;
    }
    .card-content::-webkit-scrollbar { width: 4px; }
    .card-content::-webkit-scrollbar-track { background: transparent; }
    .card-content::-webkit-scrollbar-thumb { background: #27273a; border-radius: 4px; }
    .card-content h2 { font-size: 15px; font-weight: 700; margin: 18px 0 8px; color: var(--text-bright); }
    .card-content h3 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; color: var(--text-bright); }
    .card-content p { margin-bottom: 10px; }
    .card-content ul, .card-content ol { margin: 8px 0 8px 20px; }
    .card-content li { margin-bottom: 4px; }
    .card-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
    .card-content th, .card-content td { border: 1px solid #27273a; padding: 8px 10px; text-align: left; }
    .card-content th { background: #16161f; font-weight: 600; color: var(--text-bright); }
    .card-content strong { color: var(--text-bright); }

    .card-review {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
    }
    .card-review .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .card-review .grade { font-size: 22px; font-weight: 900; margin-right: 6px; }
    .grade-A { color: var(--green); }
    .grade-B { color: var(--blue); }
    .grade-C { color: var(--orange); }
    .grade-D { color: var(--red); }

    .card-footer {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
    }
    .btn-copy {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #27273a;
      border-radius: 10px;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-copy:hover { border-color: var(--accent-1); color: var(--accent-3); background: rgba(99,102,241,0.05); }
    .btn-copy.copied {
      background: var(--green-dim);
      border-color: rgba(16,185,129,0.3);
      color: var(--green);
    }

    /* === Footer === */
    .footer {
      text-align: center;
      padding: 32px 24px 40px;
      font-size: 12px;
      color: #3f3f50;
      position: relative;
      z-index: 1;
    }
    .footer a { color: var(--accent-1); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* === Responsive === */
    @media (max-width: 640px) {
      .header { padding: 40px 0 56px; }
      .header h1 { font-size: 26px; }
      .input-section { padding: 24px 20px; }
      .api-key-row { flex-direction: column; align-items: stretch; gap: 6px; }
      .api-key-row label { min-width: auto; }
      .progress-steps { grid-template-columns: repeat(2, 1fr); }
      .results-header h2 { font-size: 22px; }
    }

    /* === Custom scrollbar === */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27273a; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f50; }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">D</div>
      </div>
      <h1>DailyFNI Blog Generator</h1>
      <p class="subtitle">상품 정보를 입력하면 3가지 톤의 네이버 블로그 글을 AI가 자동 생성합니다</p>
    </div>
  </div>

  <div class="container">
    <!-- Input Section -->
    <div class="input-section glass">

      <div class="section-label">
        <span class="dot"></span> API Configuration
      </div>
      <div class="api-key-row">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
      </div>

      <div class="section-label" style="margin-top: 20px;">
        <span class="dot"></span> Product Information
      </div>
      <div class="product-input">
        <textarea id="productInfo" placeholder="상품 정보를 붙여넣으세요.&#10;&#10;예시:&#10;삼성 갤럭시 S24 울트라&#10;- 가격: 1,650,000원~&#10;- 6.8인치 다이내믹 AMOLED 2X&#10;- 스냅드래곤 8 Gen 3&#10;- 2억 화소 카메라&#10;- 5000mAh 배터리&#10;- S펜 내장&#10;- 티타늄 프레임&#10;- Galaxy AI 기능 탑재"></textarea>
      </div>

      <button class="btn-generate" id="btnGenerate" onclick="startGenerate()">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 3v3m0 12v3m-9-9h3m12 0h3m-3.5-6.5L15 7.5m-6 9-1.5 1.5m0-12L9 7.5m6 9 1.5 1.5"/><circle cx="12" cy="12" r="4"/></svg>
        생성하기
      </button>

      <!-- Progress -->
      <div class="progress-section" id="progressSection">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-steps">
          <div class="progress-step" id="stepResearch">
            <span class="icon">&#128269;</span>리서치
          </div>
          <div class="progress-step" id="stepSeo">
            <span class="icon">&#128202;</span>SEO 분석
          </div>
          <div class="progress-step" id="stepWriting">
            <span class="icon">&#9997;&#65039;</span>글 작성
          </div>
          <div class="progress-step" id="stepReview">
            <span class="icon">&#9989;</span>검수
          </div>
        </div>
      </div>

      <!-- Error -->
      <div class="error-box" id="errorBox"></div>
    </div>

    <!-- Result Cards -->
    <div class="results-section" id="resultsSection">
      <div class="results-header">
        <h2>생성 완료</h2>
        <p>원하는 톤의 글을 복사하여 네이버 블로그에 붙여넣으세요</p>
        <div class="divider"></div>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>

  <div class="footer">
    DailyFNI &copy; 2026 &middot; Powered by Claude AI
  </div>

  <script>
    const TONE_CONFIG = {
      friendly: { label: '친근톤', desc: '~해요체', headerClass: 'friendly' },
      expert:   { label: '전문톤', desc: '~입니다체', headerClass: 'expert' },
      review:   { label: '리뷰톤', desc: '사용 후기', headerClass: 'review' },
    };

    const STEP_MAP = {
      researching:   { el: 'stepResearch', progress: 15 },
      research_done: { el: 'stepResearch', progress: 25, done: true },
      seo:           { el: 'stepSeo',      progress: 35 },
      seo_done:      { el: 'stepSeo',      progress: 45, done: true },
      writing:       { el: 'stepWriting',  progress: 55 },
      writing_done:  { el: 'stepWriting',  progress: 75, done: true },
      reviewing:     { el: 'stepReview',   progress: 85 },
      reviewing_done:{ el: 'stepReview',   progress: 95, done: true },
    };

    function startGenerate() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const productInfo = document.getElementById('productInfo').value.trim();

      if (!apiKey) return showError('Anthropic API 키를 입력하세요.');
      if (!apiKey.startsWith('sk-ant-')) return showError('유효한 Anthropic API 키 형식이 아닙니다.');
      if (!productInfo) return showError('상품 정보를 입력하세요.');

      hideError();
      setLoading(true);
      resetProgress();
      document.getElementById('resultsSection').classList.remove('active');

      fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey, product_info: productInfo }),
      }).then(response => {
        if (!response.ok) {
          return response.json().then(err => { throw new Error(err.detail || '서버 오류'); });
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            buffer += decoder.decode(value, { stream: true });

            const lines = buffer.split('\n');
            buffer = lines.pop();

            let eventType = '';
            for (const line of lines) {
              if (line.startsWith('event: ')) {
                eventType = line.slice(7).trim();
              } else if (line.startsWith('data: ') && eventType) {
                try {
                  const data = JSON.parse(line.slice(6));
                  handleEvent(eventType, data);
                } catch (e) { /* ignore */ }
                eventType = '';
              }
            }
            read();
          });
        }
        read();
      }).catch(err => {
        showError(err.message);
        setLoading(false);
      });
    }

    function handleEvent(event, data) {
      if (event === 'progress') {
        updateProgress(data.step);
      } else if (event === 'complete') {
        document.getElementById('progressBar').style.width = '100%';
        setTimeout(() => {
          setLoading(false);
          renderResults(data);
        }, 400);
      } else if (event === 'error') {
        showError(data.message);
        setLoading(false);
      }
    }

    function updateProgress(step) {
      const info = STEP_MAP[step];
      if (!info) return;

      document.getElementById('progressBar').style.width = info.progress + '%';

      if (info.done) {
        document.getElementById(info.el).classList.remove('active');
        document.getElementById(info.el).classList.add('done');
      } else {
        document.getElementById(info.el).classList.add('active');
      }
    }

    function renderResults(data) {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';

      for (const [tone, config] of Object.entries(TONE_CONFIG)) {
        const article = data.articles[tone];
        if (!article) continue;

        const review = article.review || {};
        const grade = review.grade || '-';
        const score = review.overall_score || 0;
        const verdict = review.verdict || '-';

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-header ${config.headerClass}">
            <h3>${config.label}</h3>
            <span class="badge">${config.desc}</span>
          </div>
          <div class="card-title">${escapeHtml(article.title)}</div>
          <div class="card-content">${markdownToHtml(article.content)}</div>
          <div class="card-review">
            <div class="score-row">
              <span><span class="grade grade-${grade}">${grade}</span> ${score}점</span>
              <span>${verdict}</span>
            </div>
            ${renderReviewDetails(review)}
          </div>
          <div class="card-footer">
            <button class="btn-copy" onclick="copyContent(this, '${tone}')">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              복사하기
            </button>
          </div>
        `;
        card.dataset.rawContent = article.content;
        card.dataset.tone = tone;
        grid.appendChild(card);
      }

      document.getElementById('resultsSection').classList.add('active');
      document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
    }

    function renderReviewDetails(review) {
      if (!review.spell_check && !review.seo_check && !review.quality_check) return '';
      const spell = review.spell_check?.score ?? '-';
      const seo = review.seo_check?.score ?? '-';
      const quality = review.quality_check?.score ?? '-';
      return `<div class="score-row" style="margin-top:6px;font-size:11px;color:#52525b;">
        <span>맞춤법 ${spell}</span>
        <span>SEO ${seo}</span>
        <span>품질 ${quality}</span>
      </div>`;
    }

    function copyContent(btn, tone) {
      const card = btn.closest('.card');
      const text = card.dataset.rawContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> 복사 완료!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사하기';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    /* --- Utilities --- */

    function markdownToHtml(md) {
      if (!md) return '';
      let html = escapeHtml(md);
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
      html = html.replace(/\|(.+)\|/g, (match) => {
        const cells = match.split('|').filter(c => c.trim());
        if (cells.every(c => /^[\s-:]+$/.test(c))) return '';
        const tag = 'td';
        return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      });
      html = html.replace(/(<tr>.*<\/tr>\n?)+/g, m => `<table>${m}</table>`);
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br/>');
      return `<p>${html}</p>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setLoading(loading) {
      const btn = document.getElementById('btnGenerate');
      const progress = document.getElementById('progressSection');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<svg class="spin" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> 생성 중...';
        progress.classList.add('active');
      } else {
        btn.disabled = false;
        btn.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 3v3m0 12v3m-9-9h3m12 0h3m-3.5-6.5L15 7.5m-6 9-1.5 1.5m0-12L9 7.5m6 9 1.5 1.5"/><circle cx="12" cy="12" r="4"/></svg> 생성하기';
        progress.classList.remove('active');
      }
    }

    function resetProgress() {
      document.getElementById('progressBar').style.width = '0%';
      ['stepResearch', 'stepSeo', 'stepWriting', 'stepReview'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('active', 'done');
      });
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.add('active');
    }

    function hideError() {
      document.getElementById('errorBox').classList.remove('active');
    }

    // Add spin animation
    const style = document.createElement('style');
    style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}';
    document.head.appendChild(style);
  </script>
</body>
</html>
