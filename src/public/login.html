<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대부중개 전산시스템 - 로그인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #1b2537;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      border-radius: 8px;
      width: 380px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .icon {
      display: inline-block;
      width: 48px;
      height: 48px;
      background: #3b82f6;
      border-radius: 10px;
      line-height: 48px;
      color: #fff;
      font-size: 24px;
      margin-bottom: 12px;
    }
    .login-logo h1 {
      font-size: 18px;
      color: #1e293b;
      font-weight: 700;
    }
    .login-logo p {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .login-btn {
      width: 100%;
      padding: 11px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .login-btn:hover { background: #2563eb; }
    .login-error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">&#9670;</div>
      <h1>대부중개 전산시스템</h1>
      <p>직원 계정으로 로그인하세요</p>
    </div>
    <div class="login-error" id="loginError"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="loginId" placeholder="아이디 입력" autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호 입력">
      </div>
      <button type="submit" class="login-btn">로그인</button>
    </form>
    <div class="login-footer">
      비밀번호를 잊으셨나요? 관리자에게 문의하세요.
    </div>
  </div>

  <script>
    // 이미 로그인되어 있으면 메인으로
    if (sessionStorage.getItem('loggedInUser')) {
      location.href = '/main.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPw').value;
      const errEl = document.getElementById('loginError');

      if (!id || !pw) {
        errEl.style.display = 'block';
        errEl.textContent = '아이디와 비밀번호를 입력하세요.';
        return;
      }

      try {
        const res = await fetch('/api/system/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ loginId: id, password: pw })
        });
        const data = await res.json();
        if (data.success) {
          sessionStorage.setItem('loggedInUser', JSON.stringify(data.data));
          location.href = '/main.html';
        } else {
          errEl.style.display = 'block';
          errEl.textContent = data.message || '로그인 실패';
        }
      } catch (err) {
        errEl.style.display = 'block';
        errEl.textContent = '서버 연결 실패';
      }
    }
  </script>
</body>
</html>
