<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대부중개 전산시스템</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">&#9670;</span>
      <span class="logo-text">대부중개 전산</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item-search" id="sidebarSearch" onclick="openCustomerSearch();return false;">
        <span style="font-size:10px;">&#128269;</span>
        <span>고객원장 (개별조회)</span>
      </a>
      <div class="nav-group">
        <div class="nav-label">주요 업무</div>
        <a href="#" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">&#9632;</span>대시보드
        </a>
        <a href="#" class="nav-item" data-page="customer-register">
          <span class="nav-icon">&#10010;</span>고객등록
        </a>
        <a href="#" class="nav-item" data-page="loans">
          <span class="nav-icon">&#9654;</span>대출 신청 관리
        </a>
        <a href="#" class="nav-item" data-page="loan-register">
          <span class="nav-icon">&#9654;</span>대출 접수
        </a>
      </div>
      <div class="nav-group">
        <div class="nav-label">현황관리</div>
        <a href="#" class="nav-item" data-page="customers">
          <span class="nav-icon">&#9654;</span>고객현황
        </a>
      </div>
      <div class="nav-group">
        <div class="nav-label">정산/분석</div>
        <a href="#" class="nav-item" data-page="settlement">
          <span class="nav-icon">&#9654;</span>매출/수당 정산
        </a>
        <a href="#" class="nav-item" data-page="performance">
          <span class="nav-icon">&#9654;</span>성과 분석
        </a>
      </div>
      <div class="nav-group">
        <div class="nav-label">시스템</div>
        <a href="#" class="nav-item" data-page="employees">
          <span class="nav-icon">&#9654;</span>직원/권한 관리
        </a>
        <a href="#" class="nav-item" data-page="notifications">
          <span class="nav-icon">&#9654;</span>알림
          <span class="nav-badge">3</span>
        </a>
        <a href="#" class="nav-item" data-page="audit">
          <span class="nav-icon">&#9654;</span>감사로그
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-profile" style="cursor:pointer;" onclick="handleLogout()">
        <div class="user-avatar" id="userAvatar">-</div>
        <div class="user-info">
          <div class="user-name" id="userName">-</div>
          <div class="user-role" id="userRole">-</div>
        </div>
        <div style="margin-left:auto;font-size:10px;color:#64748b;">로그아웃</div>
      </div>
    </div>
  </aside>

  <!-- 메인 영역 -->
  <div class="main-wrapper">
    <!-- 탑 헤더 -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
        <h1 class="page-title" id="pageTitle">대시보드</h1>
      </div>
      <div class="header-right">
        <div id="crawlerStatus" onclick="headerCrawlerLogin()" style="display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;" title="클릭하여 론앤마스터 연동">
          <span id="crawlerDot" style="width:6px;height:6px;border-radius:50%;background:#ef4444;"></span>
          <span id="crawlerLabel">론앤마스터: 미연결</span>
        </div>
        <div class="header-search">
          <input type="text" placeholder="고객명/연락처 검색..." id="globalSearch">
        </div>
        <button class="header-btn" data-page="notifications" title="알림">
          &#128276;<span class="noti-dot"></span>
        </button>
        <button class="header-btn" title="설정">&#9881;</button>
      </div>
    </header>

    <!-- 콘텐츠 영역 -->
    <main class="content" id="content">
      <!-- JS로 페이지별 렌더링 -->
    </main>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    // 로그인 체크
    const loggedInUser = JSON.parse(sessionStorage.getItem('loggedInUser') || 'null');
    if (!loggedInUser) { location.href = '/login.html'; }
    else {
      document.addEventListener('DOMContentLoaded', () => {
        const av = document.getElementById('userAvatar');
        const nm = document.getElementById('userName');
        const rl = document.getElementById('userRole');
        if (av) av.textContent = loggedInUser.name?.charAt(0) || '-';
        if (nm) nm.textContent = loggedInUser.name || '-';
        if (rl) rl.textContent = loggedInUser.role === 'admin' ? '관리자' : '영업직원';
      });
    }
    function handleLogout() {
      if (confirm('로그아웃 하시겠습니까?')) {
        sessionStorage.removeItem('loggedInUser');
        location.href = '/login.html';
      }
    }
  </script>
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script src="js/products.js"></script>
  <script src="js/productMatcher.js"></script>
  <script src="js/feeCalculator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
