<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 960px; height: 540px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .cover {
    width: 960px; height: 540px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* 배경 그라데이션 */
  .cover.theme-navy { background: linear-gradient(135deg, #0D1B2A 0%, #1B2838 50%, #0D1B2A 100%); }
  .cover.theme-dark { background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%); }
  .cover.theme-forest { background: linear-gradient(135deg, #1A3C34 0%, #264653 50%, #2A5C45 100%); }
  .cover.theme-midnight { background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%); }

  /* 장식 요소 */
  .cover::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 35px,
        rgba(255,255,255,0.015) 35px,
        rgba(255,255,255,0.015) 36px
      );
    pointer-events: none;
  }

  .accent-top {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 6px;
  }
  .accent-top.gold { background: linear-gradient(90deg, transparent, #FFD700, transparent); }
  .accent-top.neon { background: linear-gradient(90deg, transparent, #39FF14, transparent); }
  .accent-top.cyan { background: linear-gradient(90deg, transparent, #00E5FF, transparent); }
  .accent-top.amber { background: linear-gradient(90deg, transparent, #FFAB00, transparent); }

  .accent-bottom {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 6px;
  }
  .accent-bottom.gold { background: linear-gradient(90deg, transparent, #FFD700, transparent); }
  .accent-bottom.neon { background: linear-gradient(90deg, transparent, #39FF14, transparent); }
  .accent-bottom.cyan { background: linear-gradient(90deg, transparent, #00E5FF, transparent); }
  .accent-bottom.amber { background: linear-gradient(90deg, transparent, #FFAB00, transparent); }

  .accent-left {
    position: absolute; top: 0; left: 0;
    width: 5px; height: 100%;
  }

  /* 배지 */
  .badge {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 6px;
    font-size: 18px; font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  /* 메인 제목 */
  .title {
    font-size: 48px; font-weight: 900;
    line-height: 1.3;
    text-align: center;
    max-width: 800px;
    word-break: keep-all;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  /* 서브 제목 */
  .subtitle {
    font-size: 22px; font-weight: 400;
    margin-top: 20px;
    text-align: center;
    max-width: 700px;
    opacity: 0.85;
  }

  /* 하단 브랜드 */
  .brand {
    position: absolute; bottom: 25px;
    font-size: 14px; font-weight: 500;
    letter-spacing: 3px;
    opacity: 0.6;
  }

  /* 장식 원 */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.05;
  }
  .deco-circle.c1 { width: 300px; height: 300px; top: -80px; right: -60px; }
  .deco-circle.c2 { width: 200px; height: 200px; bottom: -40px; left: -30px; }

  /* 프레임 */
  .frame {
    position: absolute;
    top: 30px; left: 30px; right: 30px; bottom: 30px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const DATA = __DATA__;

const root = document.getElementById('root');
const theme = DATA.theme || 'navy';
const accentName = DATA.accent || 'gold';
const accentColors = {
  gold: '#FFD700', neon: '#39FF14', cyan: '#00E5FF', amber: '#FFAB00', lime: '#C6FF00'
};
const accent = accentColors[accentName] || accentColors.gold;
const textColor = DATA.textColor || '#FFFFFF';

root.innerHTML = `
  <div class="cover theme-${theme}">
    <div class="accent-top ${accentName}"></div>
    <div class="accent-bottom ${accentName}"></div>
    <div class="accent-left" style="background:${accent}"></div>
    <div class="deco-circle c1" style="background:${accent}"></div>
    <div class="deco-circle c2" style="background:${accent}"></div>
    <div class="frame"></div>
    ${DATA.badge ? `<div class="badge" style="background:${accent};color:${theme === 'navy' ? '#0D1B2A' : '#1A1A2E'}">${DATA.badge}</div>` : ''}
    <div class="title" style="color:${accent}">${DATA.title || '제목을 입력하세요'}</div>
    <div class="subtitle" style="color:${textColor}">${DATA.subtitle || ''}</div>
    <div class="brand" style="color:${accent}">DAILY FNI</div>
  </div>
`;
</script>
</body>
</html>
