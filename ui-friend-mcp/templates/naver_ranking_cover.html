<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 960px; height: 540px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .cover {
    width: 960px; height: 540px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 50px 60px;
  }

  .cover.theme-navy { background: linear-gradient(160deg, #0D1B2A 0%, #152238 60%, #0D1B2A 100%); }
  .cover.theme-dark { background: linear-gradient(160deg, #1A1A2E 0%, #16213E 60%, #0F3460 100%); }

  /* 우측 대형 숫자 워터마크 */
  .watermark {
    position: absolute;
    right: -20px; top: 50%;
    transform: translateY(-50%);
    font-size: 320px; font-weight: 900;
    opacity: 0.04;
    line-height: 1;
    color: #FFFFFF;
  }

  .accent-bar-top {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 8px;
  }
  .accent-bar-bottom {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 8px;
  }

  /* 랭킹 배지 */
  .rank-badge {
    display: inline-flex;
    align-items: center; gap: 8px;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 28px; font-weight: 900;
    letter-spacing: 3px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-size: 50px; font-weight: 900;
    line-height: 1.35;
    word-break: keep-all;
    max-width: 700px;
  }

  .subtitle {
    font-size: 22px; font-weight: 400;
    margin-top: 20px;
    opacity: 0.8;
    max-width: 600px;
  }

  .brand {
    position: absolute; bottom: 25px; right: 50px;
    font-size: 14px; font-weight: 500;
    letter-spacing: 3px;
    opacity: 0.5;
  }

  .year-badge {
    position: absolute; bottom: 25px; left: 60px;
    font-size: 13px; font-weight: 500;
    padding: 4px 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.15);
    opacity: 0.6;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const DATA = __DATA__;

const root = document.getElementById('root');
const theme = DATA.theme || 'navy';
const accentName = DATA.accent || 'gold';
const accentColors = {
  gold: '#FFD700', neon: '#39FF14', cyan: '#00E5FF', amber: '#FFAB00'
};
const accent = accentColors[accentName] || accentColors.gold;

// 제목에서 숫자 추출 (TOP 5, BEST 10 등)
const rankNum = (DATA.title || '').match(/\d+/);
const displayNum = rankNum ? rankNum[0] : '5';

root.innerHTML = `
  <div class="cover theme-${theme}">
    <div class="accent-bar-top" style="background:linear-gradient(90deg,${accent},transparent)"></div>
    <div class="accent-bar-bottom" style="background:linear-gradient(90deg,transparent,${accent})"></div>
    <div class="watermark">${displayNum}</div>

    <div class="rank-badge" style="background:${accent};color:${theme === 'navy' ? '#0D1B2A' : '#1A1A2E'}">
      ${DATA.badge || 'TOP ' + displayNum}
    </div>
    <div class="title" style="color:${accent}">${DATA.title || '추천 상품 TOP 5'}</div>
    <div class="subtitle" style="color:#FFFFFF">${DATA.subtitle || ''}</div>

    <div class="year-badge" style="color:${accent}">${new Date().getFullYear()}</div>
  </div>
`;
</script>
</body>
</html>
