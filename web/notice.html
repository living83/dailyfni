    <section class="relative overflow-hidden pt-36 sm:pt-40 lg:pt-48 pb-12">
      <div class="mesh-bg"></div>
      <div class="relative z-10 mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

          공지사항.
        </h1>
        <p class="reveal mt-6 max-w-[58ch] text-base md:text-lg text-zinc-400 leading-relaxed">
          회사의 최신 경영·고객 공시와 채무조정 요청 절차를 확인하실 수 있습니다.

    <section class="relative pb-20 lg:pb-28">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

        <!-- Tabs -->
        <div class="reveal flex flex-wrap items-center gap-2" role="tablist" aria-label="공지사항 카테고리">
          <button type="button" data-notice-tab="all"        class="notice-tab is-active rounded-full px-4 py-2 text-sm font-medium transition" role="tab" aria-selected="true">전체공시</button>
          <button type="button" data-notice-tab="management" class="notice-tab rounded-full px-4 py-2 text-sm font-medium transition" role="tab" aria-selected="false">경영공시</button>
          <button type="button" data-notice-tab="customer"   class="notice-tab rounded-full px-4 py-2 text-sm font-medium transition" role="tab" aria-selected="false">고객공시</button>
          <button type="button" data-notice-tab="debt"       class="notice-tab rounded-full px-4 py-2 text-sm font-medium transition" role="tab" aria-selected="false">채무조정요청</button>
        </div>

        <!-- ========== LIST PANEL (all / management / customer) ========== -->
        <div data-notice-panel="list" class="mt-8">
          <ul id="noticeList" class="reveal divide-y divide-white/[0.04] rounded-2xl border border-white/10 bg-white/[0.02] overflow-hidden">
            <!-- Rendered from Google Sheets CSV -->
          </ul>
          <p data-notice-empty class="hidden reveal mt-8 text-center text-xs text-zinc-500">해당 카테고리에 등록된 공지가 없습니다.</p>
        </div>

        <!-- ========== DEBT PANEL (채무조정요청) ========== -->
        <div data-notice-panel="debt" class="hidden mt-8">
          <div class="reveal rounded-3xl border border-white/10 bg-white/[0.02] p-6 sm:p-10 lg:p-12">
            <div class="flex items-start gap-4 sm:gap-5">
              <span class="inline-flex h-12 w-12 sm:h-14 sm:w-14 shrink-0 items-center justify-center rounded-2xl bg-accent-400/15 text-accent-300 ring-1 ring-accent-400/30">
                <iconify-icon icon="solar:hand-heart-bold" width="26" aria-hidden="true"></iconify-icon>
              </span>
              <div class="flex-1 min-w-0">
                <p class="text-xs tracking-[0.25em] uppercase text-accent-300">Debt Restructuring</p>
                <h2 class="mt-2 text-2xl sm:text-3xl font-bold tracking-tightest-ko text-white leading-tight">채무조정 요청 안내</h2>

                <div class="mt-5 space-y-3 text-[15px] sm:text-base text-zinc-300 leading-[1.9] break-keep-all max-w-2xl">
                  <p>데일리에프앤아이는 자체 채무조정 상세절차에 따라 채무조정요청서류를 제공하고 있습니다.</p>
                  <p class="text-white font-medium">아래 서류를 다운받아 사용하세요!</p>
                </div>

                <div class="mt-8">
                  <a href="./assets/채무조정%20요청서.pdf"
                     download="데일리에프앤아이_채무조정_요청서.pdf"
                     class="btn-magnet inline-flex items-center gap-2 rounded-full bg-accent-400 text-white px-7 py-4 text-base font-semibold shadow-brand-soft">
                    <iconify-icon icon="solar:download-minimalistic-bold" width="20" aria-hidden="true"></iconify-icon>
                    채무조정 요청서 다운로드
                    <iconify-icon class="arrow" icon="solar:arrow-right-linear" width="18" aria-hidden="true"></iconify-icon>
                  </a>
                </div>

                <div class="mt-8 rounded-2xl border border-accent-400/20 bg-accent-400/[0.05] p-5 flex items-start gap-3">
                  <iconify-icon icon="solar:info-circle-bold" class="text-accent-300 mt-0.5 shrink-0" width="20" aria-hidden="true"></iconify-icon>
                  <p class="text-sm text-zinc-300 leading-relaxed break-keep-all">
                    <span class="text-zinc-500">※</span> 상세 절차에 관한 내용은 대표번호
                    <a href="tel:02-2138-0750" class="text-accent-300 font-semibold tabular-nums hover:text-accent-200 underline underline-offset-2">02-2138-0750</a>
                    으로 연락 주셔서 상담 요청 해주세요.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============================================================
       NOTICE DATA + TAB LOGIC
       ============================================================ -->
  <script>
    // Notices — loaded from Google Sheets (Publish to web → CSV)
    // To update notices: edit the spreadsheet in Google Sheets.
    // Changes may take up to ~5 minutes to appear (Google's publish cache).
    (function () {
      var NOTICE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSH9aAyyy8M2ffmIo3MbWI-S1I1rLmEzcXLyrGIlADxhfg8q0N5nre4zZ-fPKqIMPcUcGZ9FA0G8UvK/pub?gid=0&single=true&output=csv';

      // Korean category label (sheet A열) → internal code
      var CATEGORY_MAP = {
        '경영공시': 'management',
        '고객공시': 'customer'
      };
      // Default icons per category
      var DEFAULT_ICONS = {
        management: 'solar:graph-up-bold',
        customer:   'solar:bell-bing-bold'
      };

      var tabs       = document.querySelectorAll('[data-notice-tab]');
      var panelList  = document.querySelector('[data-notice-panel="list"]');
      var panelDebt  = document.querySelector('[data-notice-panel="debt"]');
      var listEl     = document.getElementById('noticeList');
      var emptyEl    = document.querySelector('[data-notice-empty]');

      var state = {
        notices: null,  // null = not loaded yet, [] or [...] = loaded
        error: null,
        currentFilter: 'all'
      };

      function escape(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
          return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
        });
      }

      // Minimal CSV parser — handles quoted fields, escaped quotes, CRLF
      function parseCSV(text) {
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
        var rows = [], row = [], field = '', inQuotes = false;
        var i = 0, len = text.length;
        while (i < len) {
          var c = text.charAt(i);
          if (inQuotes) {
            if (c === '"') {
              if (text.charAt(i + 1) === '"') { field += '"'; i += 2; }
              else { inQuotes = false; i++; }
            } else { field += c; i++; }
          } else {
            if (c === '"') { inQuotes = true; i++; }
            else if (c === ',') { row.push(field); field = ''; i++; }
            else if (c === '\r') { i++; }
            else if (c === '\n') { row.push(field); field = ''; rows.push(row); row = []; i++; }
            else { field += c; i++; }
          }
        }
        if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
        return rows;
      }

      function rowsToObjects(rows) {
        if (!rows.length) return [];
        var header = rows[0].map(function (h) { return String(h || '').trim().toLowerCase(); });
        var items = [];
        for (var i = 1; i < rows.length; i++) {
          var row = rows[i];
          if (!row.length || row.every(function (v) { return !v || !String(v).trim(); })) continue;
          var obj = {};
          for (var j = 0; j < header.length; j++) {
            obj[header[j]] = (row[j] || '').trim();
          }
          items.push(obj);
        }
        return items;
      }

      function normalizeNotices(raw) {
        var result = [];
        raw.forEach(function (r) {
          var cat = CATEGORY_MAP[r.category];
          if (!cat) return; // unknown or blank category → skip
          result.push({
            category: cat,
            date:     r.date    || '',
            badge:    r.badge   || '공지',
            title:    r.title   || '',
            summary:  r.summary || '',
            pdf_url:  r.pdf_url || '',
            icon:     DEFAULT_ICONS[cat] || 'solar:document-text-bold'
          });
        });
        // Sort by date descending (newest first). YYYY.MM.DD string compare works as date compare.
        result.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });
        return result;
      }

      function renderItem(n) {
        var badgeClass = n.badge === '중요'
          ? 'bg-accent-400/15 text-accent-300 ring-1 ring-accent-400/30'
          : 'bg-white/5 text-zinc-300 ring-1 ring-white/10';
        var pdfBtn = '';
        if (n.pdf_url) {
          pdfBtn = ''
            + '<a href="' + escape(n.pdf_url) + '" target="_blank" rel="noopener"'
            +    ' onclick="event.stopPropagation()"'
            +    ' class="mt-2 inline-flex items-center gap-1 rounded-full border border-white/15 bg-white/[0.03] px-2.5 py-1 text-[10px] text-zinc-200 hover:bg-white/[0.07] transition">'
            +   '<iconify-icon icon="solar:download-minimalistic-bold" width="11" aria-hidden="true"></iconify-icon>'
            +   '첨부파일'
            + '</a>';
        }
        return ''
          + '<li data-notice-category="' + n.category + '">'
          +   '<button type="button" data-notice-toggle class="w-full flex items-center gap-2.5 px-4 py-2.5 text-left hover:bg-white/[0.02] transition cursor-pointer">'
          +     '<span class="inline-flex items-center rounded-full px-1.5 py-px text-[8px] shrink-0 ' + badgeClass + '">' + escape(n.badge) + '</span>'
          +     '<span class="text-[9px] text-zinc-500 tabular-nums shrink-0">' + escape(n.date) + '</span>'
          +     '<span class="text-[11px] text-white font-medium truncate flex-1 min-w-0">' + escape(n.title) + '</span>'
          +     '<iconify-icon icon="solar:alt-arrow-down-linear" width="12" class="notice-chevron text-zinc-500 shrink-0 transition-transform duration-200" aria-hidden="true"></iconify-icon>'
          +   '</button>'
          +   '<div class="notice-detail hidden px-4 pb-3 pl-[4.5rem]">'
          +     '<p class="text-[10px] text-zinc-400 leading-relaxed">' + escape(n.summary) + '</p>'
          +     pdfBtn
          +   '</div>'
          + '</li>';
      }

      function renderLoading() {
        if (!listEl) return;
        listEl.innerHTML = ''
          + '<li class="px-4 py-6 text-center text-xs text-zinc-500">'
          +   '<iconify-icon icon="svg-spinners:ring-resize" width="20" aria-hidden="true"></iconify-icon>'
          +   '<p class="mt-2">불러오는 중…</p>'
          + '</li>';
        if (emptyEl) emptyEl.classList.add('hidden');
      }

      function renderError(msg) {
        if (!listEl) return;
        listEl.innerHTML = ''
          + '<li class="px-4 py-6 text-center text-xs text-zinc-500">'
          +   '<iconify-icon icon="solar:danger-triangle-linear" width="20" aria-hidden="true"></iconify-icon>'
          +   '<p class="mt-2 text-white text-[11px]">불러오지 못했습니다.</p>'
          +   '<p class="mt-0.5 text-[9px] text-zinc-600">' + escape(msg || '네트워크 오류') + '</p>'
          + '</li>';
        if (emptyEl) emptyEl.classList.add('hidden');
      }

      function render(filter) {
        if (!listEl) return;
        if (filter) state.currentFilter = filter;

        if (state.error) { renderError(state.error); return; }
        if (state.notices === null) { renderLoading(); return; }

        var list = state.notices.filter(function (n) {
          if (state.currentFilter === 'all') return n.category === 'management' || n.category === 'customer';
          return n.category === state.currentFilter;
        });
        listEl.innerHTML = list.map(renderItem).join('');
        if (emptyEl) emptyEl.classList.toggle('hidden', list.length > 0);
      }

      function setActive(target) {
        tabs.forEach(function (t) {
          var active = t.dataset.noticeTab === target;
          t.setAttribute('aria-selected', String(active));
          t.classList.toggle('is-active', active);
        });
        if (target === 'debt') {
          if (panelList) panelList.classList.add('hidden');
          if (panelDebt) panelDebt.classList.remove('hidden');
        } else {
          if (panelList) panelList.classList.remove('hidden');
          if (panelDebt) panelDebt.classList.add('hidden');
          render(target);
        }
      }

      tabs.forEach(function (t) {
        t.addEventListener('click', function () { setActive(t.dataset.noticeTab); });
      });

      // Accordion toggle — event delegation on listEl
      if (listEl) {
        listEl.addEventListener('click', function (e) {
          var btn = e.target.closest('[data-notice-toggle]');
          if (!btn) return;
          var li = btn.closest('li');
          if (!li) return;
          var detail = li.querySelector('.notice-detail');
          var chevron = btn.querySelector('.notice-chevron');
          if (!detail) return;
          var isOpen = !detail.classList.contains('hidden');
          // Close all other open items first
          listEl.querySelectorAll('.notice-detail:not(.hidden)').forEach(function (d) {
            d.classList.add('hidden');
            var otherChevron = d.closest('li').querySelector('.notice-chevron');
            if (otherChevron) otherChevron.style.transform = '';
          });
          // Toggle current
          if (!isOpen) {
            detail.classList.remove('hidden');
            if (chevron) chevron.style.transform = 'rotate(180deg)';
          }
        });
      }

      // Fetch CSV from Google Sheets, parse, and render
      function loadNotices() {
        state.notices = null;
        state.error = null;
        render();
        fetch(NOTICE_CSV_URL, { cache: 'no-cache' })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.text();
          })
          .then(function (csvText) {
            var rows = parseCSV(csvText);
            var raw  = rowsToObjects(rows);
            state.notices = normalizeNotices(raw);
            render();
          })
          .catch(function (err) {
            state.error = (err && err.message) ? err.message : '알 수 없는 오류';
            render();
          });
      }

      // Initial load
      loadNotices();
    })();
  </script>

  <div data-site="footer"></div>
  <script src="./assets/layout.js"></script>
</body>
